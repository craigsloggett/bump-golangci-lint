name: Bump golangci-lint

description: Update the golangci-lint version in a file to the latest available release.

inputs:
  file:
    description: Path to the file to update.
    required: true
  path:
    description: >
      yq expression locating the line to update (e.g. .inputs.golangci-lint-version.default).
      Mutually exclusive with replace.
    required: false
    default: ''
  match:
    description: Regex matching the line to rewrite. Pair with replace.
    required: false
    default: ''
  replace:
    description: >
      Replacement line. Use {version} as the placeholder for the new version.
      Pair with match.
    required: false
    default: ''

outputs:
  version:
    description: The latest golangci-lint version.
    value: ${{ steps.bump-golangci-lint.outputs.version }}
  changed:
    description: Whether the file was modified by this run (true|false).
    value: ${{ steps.bump-golangci-lint.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Bump golangci-lint
      id: bump-golangci-lint
      run: ${{ github.action_path }}/src/bump_golangci_lint.sh
      shell: sh
      env:
        FILE: ${{ inputs.file }}
        YAML_PATH: ${{ inputs.path }}
        LINE_MATCH: ${{ inputs.match }}
        LINE_REPLACE: ${{ inputs.replace }}
